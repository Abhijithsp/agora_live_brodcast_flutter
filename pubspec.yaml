name: agroa_videocall
description: Agora Live Broadcast - A Material 3 Expressive live streaming app

publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  agora_rtc_engine: ^6.6.3
  permission_handler: ^12.0.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true
